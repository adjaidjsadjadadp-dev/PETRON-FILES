<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petron Files | Archivio Digitale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-morphism {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Animated Background Grid */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 500px;
            z-index: -1;
            transform: rotateX(60deg) translateY(-200px);
            animation: grid-move 20s linear infinite;
        }
        @keyframes grid-move {
            0% { background-position: 0 0; }
            100% { background-position: 0 500px; }
        }

        .file-card:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: rgba(239, 68, 68, 0.5);
        }
        
        /* LED Glow Effects */
        .glow-red {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6), 0 0 30px rgba(239, 68, 68, 0.2);
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
        }
        .glow-border-red {
            border: 2px solid #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5), inset 0 0 10px rgba(239, 68, 68, 0.2);
        }
        .glow-text-red {
            color: #ef4444;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.8), 0 0 20px rgba(239, 68, 68, 0.4);
        }
        .neon-input {
            background: rgba(10, 10, 12, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.3);
            transition: all 0.3s ease;
        }
        .neon-input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            outline: none;
        }
        
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(239, 68, 68, 0.1);
            position: absolute;
            animation: scanline 4s linear infinite;
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ef4444;
        }
        
        #mainContent.locked {
            display: none;
        }
        #loginScreen.hidden {
            display: none;
        }

        /* Loading Screen & Toasts */
        #loadingScreen {
            background: #050507;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #ef4444;
            width: 0%;
            box-shadow: 0 0 15px #ef4444;
            transition: width 0.3s ease;
        }
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: bold;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toast-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes toast-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#050507] text-gray-100 font-sans min-h-screen relative overflow-x-hidden">
    <div class="cyber-grid"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0">
        <div class="scanline"></div>
        <div class="text-center">
            <div class="mb-8 relative">
                <div class="w-24 h-24 border-4 border-red-600/20 border-t-red-600 rounded-full animate-spin mx-auto"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i data-lucide="shield" class="w-8 h-8 text-red-500 animate-pulse"></i>
                </div>
            </div>
            <h2 id="loadingText" class="text-xl font-black glow-text-red mb-4 uppercase tracking-[0.2em]">Decrypting...</h2>
            <div class="progress-bar mx-auto">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="mt-4 text-[10px] text-gray-500 font-mono uppercase tracking-widest" id="loadingStatus">Initializing handshake...</div>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-[200] flex items-center justify-center bg-[#050507]">
        <div class="scanline"></div>
        <div class="max-w-md w-full p-8 glass-morphism rounded-2xl glow-border-red relative overflow-hidden">
            <!-- Background detail -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-red-600/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-red-600/10 rounded-full blur-3xl"></div>

            <div class="text-center mb-10 relative">
                <div class="inline-block p-4 bg-red-600/10 rounded-full mb-4 glow-border-red">
                    <i data-lucide="lock" class="w-12 h-12 text-red-500"></i>
                </div>
                <h2 class="text-3xl font-black tracking-tighter glow-text-red mb-2 uppercase">Access Restricted</h2>
                <p class="text-xs text-gray-500 font-mono tracking-widest uppercase">Petron Security Protocol v4.0</p>
            </div>

            <div class="space-y-6 relative">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-red-500 font-bold mb-2 ml-1">Terminal ID: PETRON_ADMIN</label>
                    <div class="relative">
                        <i data-lucide="key" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-red-500/50"></i>
                        <input type="password" id="passwordInput" placeholder="ENTER ACCESS KEY..." 
                            onkeydown="if(event.key==='Enter') checkPassword()"
                            class="w-full pl-12 pr-4 py-4 neon-input rounded-xl text-red-500 font-mono placeholder:text-red-900/50">
                    </div>
                </div>
                
                <button onclick="checkPassword()" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black rounded-xl transition-all glow-red transform active:scale-95 uppercase tracking-widest">
                    Authorize Entry
                </button>

                <div id="errorMsg" class="text-center h-4 text-red-500 text-[10px] font-bold uppercase tracking-tighter opacity-0 transition-opacity">
                    Access Denied: Invalid Security Key
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-800/50 flex justify-between items-center text-[10px] text-gray-600 font-mono uppercase tracking-widest">
                <span>Status: Waiting</span>
                <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span> Encrypted</span>
            </div>
        </div>
    </div>

    <div id="mainContent" class="locked">
        <!-- Terminal Logs -->
        <div class="fixed bottom-4 left-4 z-[40] w-72 pointer-events-none">
            <div id="terminalLogs" class="bg-black/80 border border-red-500/20 rounded-lg p-3 font-mono text-[9px] text-red-500/60 flex flex-col gap-1 overflow-hidden h-32">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <span class="uppercase font-bold text-red-500">System Logs</span>

            </div>
        </div>

        <!-- Header -->
        <header class="sticky top-0 z-50 glass-morphism border-b border-gray-800 p-4 mb-8">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 p-2 rounded-lg">
                    <i data-lucide="database" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tighter text-white">PETRON<span class="text-red-600">FILES</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="openUploadModal()" class="flex items-center gap-2 px-4 py-2 bg-red-600/20 hover:bg-red-600 border border-red-500/50 rounded-lg text-xs font-bold transition-all glow-red">
                    <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                    UPLOAD FILE
                </button>
                <div class="hidden md:flex flex-col items-end">
                    <div class="flex items-center gap-4 mb-1">
                        <span class="text-[9px] font-mono text-gray-500 uppercase flex items-center gap-1">
                            <i data-lucide="eye" class="w-3 h-3 text-red-500"></i>

                        </span>
                        <span class="text-[9px] font-mono text-gray-500 uppercase flex items-center gap-1">

                    <div class="flex items-center gap-2">

                        </div>

    <main class="container mx-auto px-4 pb-20">
        <!-- Controls -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div class="md:col-span-2 relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                <input type="text" id="searchInput" placeholder="Cerca nell'archivio..." 
                    class="w-full pl-12 pr-4 py-3 bg-gray-900 border border-gray-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-600/50 transition-all">
            </div>
            <select id="categoryFilter" class="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none">
                <option value="all">Tutte le categorie</option>
                <option value="IMAGE">Immagini</option>
                <option value="VIDEO">Video</option>
                <option value="DOC">Documenti</option>
                <option value="INTEL">Intelligence</option>
            </select>
            <div class="flex items-center gap-2 px-4 bg-gray-900 border border-gray-800 rounded-xl cursor-pointer hover:bg-gray-800 transition-colors">
                <input type="checkbox" id="showSystemFiles" checked class="w-4 h-4 accent-red-600 cursor-pointer">
                <label for="showSystemFiles" class="text-[10px] uppercase font-bold text-gray-400 cursor-pointer whitespace-nowrap">File Sistema</label>
            </div>
            <div class="flex bg-gray-900 border border-gray-800 rounded-xl p-1">
                <button onclick="setView('grid')" id="gridViewBtn" class="flex-1 flex items-center justify-center py-2 rounded-lg bg-gray-800 text-red-500">
                    <i data-lucide="grid" class="w-5 h-5"></i>
                </button>
                <button onclick="setView('list')" id="listViewBtn" class="flex-1 flex items-center justify-center py-2 rounded-lg text-gray-500 hover:text-white transition-colors">
                    <i data-lucide="list" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Files Grid/List -->
        <div id="fileContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Dynamic content here -->
        </div>
    </main>

    <!-- Modal (Optional for preview) -->
    <div id="previewModal" class="fixed inset-0 z-[100] hidden bg-black/90 flex items-center justify-center p-4">
        <div class="max-w-4xl w-full glass-morphism rounded-2xl overflow-hidden relative">
            <button onclick="closePreview()" class="absolute top-4 right-4 text-white/50 hover:text-white z-10">
                <i data-lucide="x-circle" class="w-8 h-8"></i>
            </button>
            <div id="modalContent" class="p-2"></div>
        </div>
    </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="fixed inset-0 z-[150] hidden bg-black/95 flex items-center justify-center p-4">
        <div class="max-w-md w-full glass-morphism rounded-2xl glow-border-red p-8 relative overflow-hidden">
            <div class="scanline"></div>
            <button onclick="closeUploadModal()" class="absolute top-4 right-4 text-white/50 hover:text-white z-10">
                <i data-lucide="x-circle" class="w-6 h-6"></i>
            </button>
            
            <div class="text-center mb-8">
                <h3 class="text-xl font-black glow-text-red uppercase">Submit to Archive</h3>
                <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">Petron Protocol: Secure Uplink</p>
            </div>

            <form id="uploadForm" onsubmit="handleFileUpload(event)" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-red-500 font-bold mb-1 ml-1">File Name</label>
                    <input type="text" id="upName" required placeholder="e.g. mission_report_X" 
                        class="w-full px-4 py-3 neon-input rounded-lg text-sm font-mono text-red-500 placeholder:text-red-900/30">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-red-500 font-bold mb-1 ml-1">Category</label>
                    <select id="upType" class="w-full px-4 py-3 neon-input rounded-lg text-sm font-mono text-red-500">
                        <option value="IMAGE">IMAGE</option>
                        <option value="VIDEO">VIDEO</option>
                        <option value="DOC">DOCUMENT</option>
                        <option value="INTEL">INTELLIGENCE</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-red-500 font-bold mb-1 ml-1">Source (File or URL)</label>
                    <div class="space-y-2">
                        <input type="file" id="upFile" class="hidden" onchange="updateFileName(this)">
                        <button type="button" onclick="document.getElementById('upFile').click()" class="w-full px-4 py-3 neon-input rounded-lg text-sm font-mono text-red-500/70 text-left flex items-center gap-2 hover:border-red-500 transition-colors">
                            <i data-lucide="paperclip" class="w-4 h-4"></i>
                            <span id="fileNameLabel">Sfoglia PC...</span>
                        </button>
                        <div class="text-center text-[10px] text-gray-600 uppercase font-bold">— OPPURE —</div>
                        <input type="text" id="upUrl" placeholder="Incolla URL (https://...)" 
                            class="w-full px-4 py-3 neon-input rounded-lg text-sm font-mono text-red-500 placeholder:text-red-900/30">
                    </div>
                </div>
                
                <button type="submit" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black rounded-xl transition-all glow-red transform active:scale-95 uppercase tracking-widest mt-4">
                    Encrypt & Upload
                </button>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE SUPABASE (Per rendere il sito GLOBALE)
        const SUPABASE_URL = 'https://maxluyzfhhpelhqzgdxi.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1heGx1eXpmaGhwZWxocXpnZHhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjIzNDEsImV4cCI6MjA4ODIzODM0MX0.JM9nYIRB3czH6gcpXCiLb1sjriSm210sKZvW6z_ORZQ'; 
        
        // Sistema di sicurezza universale
        function getAuthCodes(str) {
            const s = str.toUpperCase().trim();
            let h = 0;
            for(let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
            return ["v2_" + Math.abs(h).toString(16), btoa(s)];
        }

        const AUTH_KEYS = {
            login: ["v2_74246830", "UEVUUk9O"],
            admin: ["v2_3c179836", "UEVUUk9OMjNAIw=="]
        };

        let petronDb = null;
        try {
            if (SUPABASE_URL !== 'IL_TUO_SUPABASE_URL' && SUPABASE_URL.startsWith('http')) {
                petronDb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) { console.error("Supabase not initialized", e); }

        const files = [
            { id: 1, name: "missione_petron_01.jpg", date: "2026-03-01", type: "IMAGE", size: "2.4 MB", url: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=800&q=80" },
            { id: 2, name: "sorveglianza_area_51.mp4", date: "2026-02-15", type: "VIDEO", size: "45.8 MB", url: "https://assets.mixkit.co/videos/preview/mixkit-security-camera-view-of-a-street-at-night-10023-preview.mp4" },
            { id: 3, name: "protocollo_segreto.pdf", date: "2026-01-10", type: "DOC", size: "1.2 MB", url: "#" },
            { id: 4, name: "mappa_base_artica.png", date: "2026-02-28", type: "IMAGE", size: "5.1 MB", url: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80" },
            { id: 5, name: "intercettazione_radio.mp3", date: "2026-03-03", type: "INTEL", size: "12.4 MB", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { id: 6, name: "agente_007_report.docx", date: "2025-12-20", type: "DOC", size: "850 KB", url: "#" },
            { id: 7, name: "satellite_view_city.jpg", date: "2026-03-02", type: "IMAGE", size: "8.2 MB", url: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=800&q=80" },
            { id: 8, name: "drone_footage_forest.mp4", date: "2026-01-05", type: "VIDEO", size: "120 MB", url: "https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-the-sunlight-529-preview.mp4" },
            { id: 9, name: "codice_criptato_alfa.txt", date: "2026-03-04", type: "INTEL", size: "45 KB", url: "#" },
            { id: 10, name: "schema_reattore.svg", date: "2026-02-10", type: "IMAGE", size: "1.5 MB", url: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" },
            { id: 11, name: "intervista_testimone.mp4", date: "2026-02-22", type: "VIDEO", size: "32.4 MB", url: "https://assets.mixkit.co/videos/preview/mixkit-man-talking-on-the-phone-in-the-dark-32948-preview.mp4" },
            { id: 12, name: "archivio_storico_2020.zip", date: "2020-05-15", type: "DOC", size: "2.4 GB", url: "#" }
        ];

        let localFiles = JSON.parse(localStorage.getItem('petron_local_files') || '[]');
        let cloudFiles = [];

        async function getFiles() {
            if (petronDb) {
                const { data, error } = await petronDb.from('petron_files').select('*').order('created_at', { ascending: false });
                if (!error) {
                    cloudFiles = data.map(f => ({ ...f, fromCloud: true }));
                    updateStorageUsage([...cloudFiles, ...localFiles]);
                }
                updateSystemStats();
            }
            return [...cloudFiles, ...localFiles, ...files];
        }

        async function updateSystemStats() {
            if (!petronDb) return;
            
            // Gestione Visite
            try {
                const { data: stats } = await petronDb.from('site_stats').select('count').eq('id', 'total_visits').single();
                if (stats) {
                    document.getElementById('visitCount').innerText = stats.count;
                    // Incrementiamo la visita solo una volta per sessione
                    if (!sessionStorage.getItem('visited')) {
                        await petronDb.from('site_stats').update({ count: stats.count + 1 }).eq('id', 'total_visits');
                        sessionStorage.setItem('visited', 'true');
                    }
                }
            } catch(e) { console.warn("Stats failed"); }

            // Gestione Online (Presence)
            const channel = petronDb.channel('online-users');
            channel
                .on('presence', { event: 'sync' }, () => {
                    const state = channel.presenceState();
                    document.getElementById('onlineCount').innerText = Object.keys(state).length;
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await channel.track({ online_at: new Date().toISOString() });
                    }
                });
        }

        function updateStorageUsage(allFiles) {
            let totalMB = 0;
            allFiles.forEach(f => {
                if (f.size) {
                    const sizeNum = parseFloat(f.size);
                    if (!isNaN(sizeNum)) totalMB += sizeNum;
                }
            });
            
            const limit = 500;
            const percent = Math.min((totalMB / limit) * 100, 100);
            
            document.getElementById('storageBar').style.width = `${percent}%`;
            document.getElementById('storageLabel').innerText = `STORAGE: ${totalMB.toFixed(1)}/${limit}MB`;
            
            if (percent > 90) document.getElementById('storageBar').className = 'h-full bg-red-500 animate-pulse';
            else if (percent > 70) document.getElementById('storageBar').className = 'h-full bg-yellow-500';
            else document.getElementById('storageBar').className = 'h-full bg-red-600';
        }

        let currentView = 'grid';
        const container = document.getElementById('fileContainer');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');

        async function renderFiles() {
            const term = searchInput.value.toLowerCase();
            const category = categoryFilter.value;
            const showSystem = document.getElementById('showSystemFiles').checked;
            const allFiles = await getFiles();
            
            const filteredFiles = allFiles.filter(f => {
                const matchesSearch = f.name.toLowerCase().includes(term);
                const matchesCategory = category === 'all' || f.type === category;
                const isSystemFile = f.id <= 12 && !f.fromCloud && !f.isLocal;
                const matchesSystemFilter = showSystem || !isSystemFile;
                return matchesSearch && matchesCategory && matchesSystemFilter;
            });

            container.innerHTML = '';
            
            if (currentView === 'grid') {
                container.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6";
                filteredFiles.forEach(file => {
                    container.appendChild(createGridItem(file));
                });
            } else {
                container.className = "flex flex-col gap-2";
                filteredFiles.forEach(file => {
                    container.appendChild(createListItem(file));
                });
            }
            lucide.createIcons();
        }

        function openUploadModal() {
            document.getElementById('uploadModal').classList.remove('hidden');
            logSystem("Ready for secure uplink...");
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.add('hidden');
            document.getElementById('fileNameLabel').innerText = "Sfoglia PC...";
        }

        function updateFileName(input) {
            const label = document.getElementById('fileNameLabel');
            const typeSelect = document.getElementById('upType');
            if (input.files && input.files[0]) {
                const file = input.files[0];
                label.innerText = file.name;
                label.classList.remove('text-red-500/70');
                label.classList.add('text-red-500');

                // Auto-detect type
                if (file.type.startsWith('image/')) typeSelect.value = 'IMAGE';
                else if (file.type.startsWith('video/')) typeSelect.value = 'VIDEO';
                else if (file.type.startsWith('audio/')) typeSelect.value = 'INTEL';
                else typeSelect.value = 'DOC';
            }
        }

        function downloadFile(file) {
            if (file.url === '#') {
                showToast("File non disponibile per il download", "error");
                return;
            }
            logSystem(`Downloading: ${file.name}`);
            const link = document.createElement('a');
            link.href = file.url;
            link.download = file.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Download avviato");
        }

        async function renameFile(file) {
            if (file.id <= 12 && !file.isLocal && !file.fromCloud) {
                showToast("Impossibile rinominare file di sistema", "error");
                return;
            }

            const newName = prompt(`Rinomina file: "${file.name}"`, file.name);
            if (!newName || newName === file.name) return;

            logSystem(`Renaming: ${file.name} -> ${newName}`);
            
            try {
                if (petronDb && file.fromCloud) {
                    const { error } = await petronDb.from('petron_files').update({ name: newName }).eq('id', file.id);
                    if (error) throw error;
                    showToast("File rinominato nel cloud");
                } else {
                    localFiles = localFiles.map(f => f.id === file.id ? { ...f, name: newName } : f);
                    localStorage.setItem('petron_local_files', JSON.stringify(localFiles));
                    showToast("File rinominato localmente");
                }
                renderFiles();
            } catch (e) {
                console.error("Rename failed", e);
                showToast("Errore durante il rename", "error");
            }
        }

        async function deleteFile(file) {
            // I file di sistema (id 1-12) non possono essere eliminati
            if (file.id <= 12 && !file.isLocal && !file.fromCloud) {
                showToast("Impossibile eliminare file di sistema", "error");
                return;
            }

            // Primo step: Richiesta Password
            const pwd = prompt(`SISTEMA DI SICUREZZA PETRON\n\nInserisci la password di amministrazione per procedere all'eliminazione di:\n"${file.name}"`);
            
            if (pwd === null) return;
            const codes = getAuthCodes(pwd);
            
            if (!codes.some(c => AUTH_KEYS.admin.includes(c))) {
                showToast("Password errata: Accesso negato", "error");
                logSystem(`Unauthorized delete attempt: ${file.name}`);
                return;
            }

            // Secondo step: Conferma finale
            const confirmed = confirm(`AUTORIZZAZIONE RICEVUTA\n\nSei assolutamente sicuro di voler ELIMINARE DEFINITIVAMENTE "${file.name}"?\nQuesta azione non può essere annullata.`);
            
            if (!confirmed) return;

            logSystem(`Purging file: ${file.name}`);
            
            try {
                if (petronDb && file.fromCloud) { 
                    const { error } = await petronDb.from('petron_files').delete().eq('id', file.id);
                    if (error) throw error;
                    showToast("File eliminato dall'archivio globale");
                } else {
                    localFiles = localFiles.filter(f => f.id !== file.id);
                    localStorage.setItem('petron_local_files', JSON.stringify(localFiles));
                    showToast("File rimosso dall'archivio locale");
                }
                renderFiles();
            } catch (e) {
                console.error("Delete failed", e);
                showToast("Errore durante l'eliminazione", "error");
            }
        }

        async function handleFileUpload(e) {
            e.preventDefault();
            const nameInput = document.getElementById('upName');
            const typeInput = document.getElementById('upType');
            const urlInput = document.getElementById('upUrl');
            const fileInput = document.getElementById('upFile');
            
            let finalUrl = urlInput.value || '#';
            let fileSize = (Math.random() * 10 + 1).toFixed(1) + " MB";

            // Se l'utente ha selezionato un file dal PC
            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                fileSize = (file.size / (1024 * 1024)).toFixed(1) + " MB";
                
                // Leggiamo il file come Base64 (Data URL)
                finalUrl = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }
            
            logSystem(`Encrypting ${nameInput.value}...`);
            
            const newFile = {
                id: Date.now(),
                name: nameInput.value,
                date: new Date().toISOString().split('T')[0],
                type: typeInput.value,
                size: fileSize,
                url: finalUrl
            };

            // Simulate encryption delay (Reduced for better performance)
            await new Promise(r => setTimeout(r, 600));
            
            if (petronDb) {
                // Rimuoviamo id e isLocal per il database se necessario (Supabase lo genera da solo)
                const { error } = await petronDb.from('petron_files').insert([{
                    name: newFile.name,
                    date: newFile.date,
                    type: newFile.type,
                    size: newFile.size,
                    url: newFile.url
                }]);
                
                if (error) {
                    console.error("Cloud upload failed, falling back to local", error);
                    logSystem(`Cloud Error: ${error.message}`);
                    localFiles.unshift({ ...newFile, isLocal: true });
                    localStorage.setItem('petron_local_files', JSON.stringify(localFiles));
                } else {
                    logSystem(`Database: File ${nameInput.value} stored successfully`);
                    showToast(`File ${nameInput.value} synchronized to Global Archive`);
                }
            } else {
                localFiles.unshift({ ...newFile, isLocal: true });
                localStorage.setItem('petron_local_files', JSON.stringify(localFiles));
                logSystem("Cloud not connected: Saved to local");
                showToast(`File ${nameInput.value} saved to Local Browser (Cloud not configured)`);
            }
            
            closeUploadModal();
            document.getElementById('uploadForm').reset();
            renderFiles();
        }

        function getIcon(type) {
            switch(type) {
                case 'IMAGE': return 'image';
                case 'VIDEO': return 'film';
                case 'DOC': return 'file-text';
                case 'INTEL': return 'lock';
                default: return 'file';
            }
        }

        function getBadgeClass(type) {
            switch(type) {
                case 'IMAGE': return 'bg-purple-900/50 text-purple-400 border border-purple-800';
                case 'VIDEO': return 'bg-blue-900/50 text-blue-400 border border-blue-800';
                case 'DOC': return 'bg-yellow-900/50 text-yellow-400 border border-yellow-800';
                case 'INTEL': return 'bg-red-900/50 text-red-400 border border-red-800';
                default: return 'bg-gray-800 text-gray-400';
            }
        }

        function createGridItem(file) {
            const div = document.createElement('div');
            div.className = "file-card glass-morphism rounded-xl overflow-hidden border border-gray-800 cursor-pointer";
            div.onclick = () => openPreview(file);
            
            const isMedia = file.type === 'IMAGE' || file.type === 'VIDEO' || (file.type === 'INTEL' && file.url !== '#');
            const previewHtml = isMedia 
                ? `<div class="h-40 bg-gray-900 overflow-hidden relative">
                    ${file.type === 'IMAGE' 
                        ? `<img src="${file.url}" class="w-full h-full object-cover opacity-60 hover:opacity-100 transition-opacity">`
                        : file.type === 'VIDEO'
                        ? `<video src="${file.url}" class="w-full h-full object-cover opacity-60" muted onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0;"></video>
                           <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <i data-lucide="play-circle" class="w-10 h-10 text-white/50"></i>
                           </div>`
                        : `<div class="w-full h-full flex items-center justify-center bg-red-900/10">
                            <i data-lucide="mic" class="w-12 h-12 text-red-500/30 animate-pulse"></i>
                           </div>`
                    }
                   </div>`
                : `<div class="h-40 bg-gray-900 flex items-center justify-center">
                    <i data-lucide="${getIcon(file.type)}" class="w-16 h-16 text-gray-700"></i>
                   </div>`;

            div.innerHTML = `
                ${previewHtml}
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] px-2 py-0.5 rounded uppercase font-bold ${getBadgeClass(file.type)}">${file.type}</span>
                        <div class="flex gap-2">
                            ${(file.isLocal || file.fromCloud) ? `
                                <button onclick="event.stopPropagation(); renameFile(${JSON.stringify(file).replace(/"/g, '&quot;')})" class="text-gray-500 hover:text-red-500 transition-colors">
                                    <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
                                </button>
                                <button onclick="event.stopPropagation(); deleteFile(${JSON.stringify(file).replace(/"/g, '&quot;')})" class="text-red-500/50 hover:text-red-500 transition-colors">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                </button>
                            ` : ''}
                            <span class="text-[10px] text-gray-500 font-mono">${file.size}</span>
                        </div>
                    </div>
                    <h3 class="font-bold text-sm truncate text-gray-200" title="${file.name}">${file.name}</h3>
                    <p class="text-xs text-gray-500 mt-1">${file.date}</p>
                </div>
            `;
            return div;
        }

        function createListItem(file) {
            const div = document.createElement('div');
            div.className = "flex items-center gap-4 p-3 glass-morphism rounded-lg border border-gray-800 hover:border-red-500/50 transition-all cursor-pointer";
            div.onclick = () => openPreview(file);
            div.innerHTML = `
                <div class="w-10 h-10 rounded-lg bg-gray-900 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="${getIcon(file.type)}" class="w-5 h-5 text-gray-400"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-bold text-sm truncate text-gray-200">${file.name}</h3>
                    <div class="flex items-center gap-3 mt-0.5">
                        <span class="text-[10px] uppercase font-bold text-gray-500">${file.type}</span>
                        <span class="text-[10px] text-gray-600">•</span>
                        <span class="text-[10px] text-gray-600">${file.date}</span>
                    </div>
                </div>
                <div class="text-[10px] font-mono text-gray-500 px-4">${file.size}</div>
                <div class="flex gap-1">
                    ${(file.isLocal || file.fromCloud) ? `
                        <button onclick="event.stopPropagation(); renameFile(${JSON.stringify(file).replace(/"/g, '&quot;')})" class="text-gray-600 hover:text-red-500 p-2 transition-colors">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deleteFile(${JSON.stringify(file).replace(/"/g, '&quot;')})" class="text-gray-600 hover:text-red-500 p-2 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    ` : ''}
                    <button onclick="event.stopPropagation(); downloadFile(${JSON.stringify(file).replace(/"/g, '&quot;')})" class="text-red-500 hover:text-red-400 p-2">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </button>
                </div>
            `;
            return div;
        }

        function setView(view) {
            currentView = view;
            document.getElementById('gridViewBtn').className = `flex-1 flex items-center justify-center py-2 rounded-lg ${view === 'grid' ? 'bg-gray-800 text-red-500' : 'text-gray-500'}`;
            document.getElementById('listViewBtn').className = `flex-1 flex items-center justify-center py-2 rounded-lg ${view === 'list' ? 'bg-gray-800 text-red-500' : 'text-gray-500'}`;
            logSystem(`View mode changed to ${view}`);
            renderFiles();
        }

        function openPreview(file) {
            logSystem(`Accessing file: ${file.name}`);
            const modal = document.getElementById('previewModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            
            let innerHtml = '';
            if (file.type === 'IMAGE') {
                innerHtml = `<img src="${file.url}" class="w-full max-h-[80vh] object-contain rounded-lg">`;
            } else if (file.type === 'VIDEO') {
                innerHtml = `<video src="${file.url}" controls autoplay class="w-full max-h-[80vh] rounded-lg"></video>`;
            } else if (file.type === 'INTEL' && file.url.endsWith('.mp3')) {
                innerHtml = `
                    <div class="py-20 flex flex-col items-center gap-8 bg-black/40 rounded-xl">
                        <div class="relative">
                            <div class="w-32 h-32 border-4 border-red-500/20 border-t-red-500 rounded-full animate-spin"></div>
                            <div class="absolute inset-0 flex items-center justify-center">
                                <i data-lucide="mic" class="w-12 h-12 text-red-500"></i>
                            </div>
                        </div>
                        <div class="text-center">
                            <h2 class="text-2xl font-bold mb-2 glow-text-red uppercase">${file.name}</h2>
                            <p class="text-gray-500 font-mono text-xs mb-8">ENCRYPTED AUDIO STREAM</p>
                            <audio src="${file.url}" controls autoplay class="w-80 h-10 accent-red-500"></audio>
                        </div>
                    </div>
                `;
            } else {
                innerHtml = `
                    <div class="py-20 flex flex-col items-center gap-6">
                        <i data-lucide="${getIcon(file.type)}" class="w-24 h-24 text-red-500/50"></i>
                        <div class="text-center">
                            <h2 class="text-2xl font-bold mb-2">${file.name}</h2>
                            <p class="text-gray-400">Anteprima non disponibile per questo tipo di file.</p>
                            <button onclick='downloadFile(${JSON.stringify(file).replace(/'/g, "\\'")})' class="mt-8 px-6 py-3 bg-red-600 hover:bg-red-700 rounded-xl font-bold transition-colors">SCARICA FILE</button>
                        </div>
                    </div>
                `;
            }
            content.innerHTML = innerHtml;
            lucide.createIcons();
        }

        function closePreview() {
            const modal = document.getElementById('previewModal');
            modal.classList.add('hidden');
            document.getElementById('modalContent').innerHTML = '';
        }

        searchInput.addEventListener('input', renderFiles);
        categoryFilter.addEventListener('change', renderFiles);
        document.getElementById('showSystemFiles').addEventListener('change', renderFiles);

        // Initial render
        renderFiles();

        function showToast(message, type = 'success') {
            logSystem(message);
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const icon = type === 'success' ? 'check-circle' : 'alert-triangle';
            const bgColor = type === 'success' ? 'bg-green-900/80 border border-green-500/50' : 'bg-red-900/80 border border-red-500/50';
            const textColor = type === 'success' ? 'text-green-400' : 'text-red-400';
            
            toast.className = `toast ${bgColor} ${textColor} glass-morphism`;
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-5 h-5"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                toast.style.transition = 'all 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function logSystem(msg) {
            const term = document.getElementById('terminalLogs');
            if (!term) return;
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString('it-IT', { hour12: false });
            entry.innerHTML = `<span class="text-gray-600">[${time}]</span> > ${msg.toUpperCase()}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
            if (term.children.length > 8) term.children[1].remove(); // Keep last 7 + header
        }

        async function startLoading() {
            const login = document.getElementById('loginScreen');
            const loader = document.getElementById('loadingScreen');
            const main = document.getElementById('mainContent');
            const fill = document.getElementById('progressFill');
            const status = document.getElementById('loadingStatus');

            login.classList.add('hidden');
            loader.style.display = 'flex';
            logSystem("Handshake sequence initiated");
            
            const steps = [
                { p: 25, s: "Bypassing firewalls..." },
                { p: 55, s: "Decrypting file system..." },
                { p: 85, s: "Syncing secure node..." },
                { p: 100, s: "Access granted." }
            ];

            for (const step of steps) {
                await new Promise(r => setTimeout(r, 200 + Math.random() * 300));
                fill.style.width = `${step.p}%`;
                status.innerText = step.s;
                logSystem(step.s);
            }

            await new Promise(r => setTimeout(r, 300));
            loader.style.display = 'none';
            main.classList.remove('locked');
            showToast("Secure connection established");
        }

        function checkPassword() {
            const passwordInput = document.getElementById('passwordInput');
            const password = passwordInput.value.trim();
            if (!password) return;
            
            const codes = getAuthCodes(password);
            
            if (codes.some(c => AUTH_KEYS.login.includes(c))) {
                showToast("Identity verified: Admin");
                startLoading();
            } else {
                logSystem(`Access Denied: Invalid Key (${codes[0]})`);
                showToast("Unauthorized access detected", "error");
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.classList.remove('opacity-0');
                setTimeout(() => errorMsg.classList.add('opacity-0'), 2000);
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        lucide.createIcons();
    </script>
</body>
</html>
